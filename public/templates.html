<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates - MailOps</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>
    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text"><span class="brand-title">MailOps</span></div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">Email Templates</h2>
                    <p class="text-muted mb-0">Reusable subject and body templates with merge fields</p>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#templateModal"><i class="fa-solid fa-plus me-2"></i>New Template</button>
            </div>
            <div id="templatesList" class="row g-3"></div>
        </div>
    </div>

    <div class="modal fade" id="templateModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Email Template</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Name</label><input type="text" id="tplName" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Company name</label><input type="text" id="tplCompany" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Subject lines (one per line — one picked at random)</label><textarea id="tplSubjects" class="form-control" rows="3"></textarea></div>
                    <div class="mb-3"><label class="form-label">Body templates (separate with --- on its own line)</label><textarea id="tplBodies" class="form-control" rows="10"></textarea></div>
                    <p class="small text-muted">Fields: {Name}, {Email}, {State}, {SENDER_NAME}, {SENDER_EMAIL}, {COMPANY_NAME}</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveTplBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        async function loadTemplates() {
            const el = document.getElementById('templatesList');
            const res = await axios.get('/api/templates');
            el.innerHTML = res.data.map(t => `<div class="col-md-6"><div class="glass-card p-4 h-100">
                <div class="d-flex justify-content-between"><h5>${t.name}${t.isDefault ? ' <span class="badge bg-primary">Default</span>' : ''}</h5>
                <button class="btn btn-sm btn-outline-danger del-tpl" data-id="${t._id}"><i class="fa-solid fa-trash"></i></button></div>
                <p class="text-muted small mb-2">${t.companyName || 'No company name'}</p>
                <p class="small mb-0"><strong>${(t.subjectTemplates||[]).length}</strong> subjects · <strong>${(t.bodyTemplates||[]).length}</strong> bodies</p>
            </div></div>`).join('') || '<p class="text-muted">No templates</p>';

            el.querySelectorAll('.del-tpl').forEach(btn => btn.addEventListener('click', async () => {
                if (!confirm('Delete template?')) return;
                await axios.delete(`/api/templates/${btn.dataset.id}`);
                loadTemplates();
            }));
        }

        document.getElementById('saveTplBtn').addEventListener('click', async () => {
            const subjects = document.getElementById('tplSubjects').value.split('\n').map(s => s.trim()).filter(Boolean);
            const bodies = document.getElementById('tplBodies').value.split(/\n---\n/).map(s => s.trim()).filter(Boolean);
            if (!document.getElementById('tplName').value || !subjects.length || !bodies.length) {
                return showToast('Name, subjects, and bodies required', 'error');
            }
            await axios.post('/api/templates', {
                name: document.getElementById('tplName').value,
                companyName: document.getElementById('tplCompany').value,
                subjectTemplates: subjects,
                bodyTemplates: bodies,
            });
            bootstrap.Modal.getInstance(document.getElementById('templateModal')).hide();
            showToast('Template saved', 'success');
            loadTemplates();
        });

        document.addEventListener('DOMContentLoaded', loadTemplates);
    </script>
</body>
</html>
