<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Detail - MailOps</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>
    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text"><span class="brand-title">MailOps</span></div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <a href="/campaigns.html" class="text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Campaigns</a>
                    <h2 class="fw-bold mb-1" id="campaignTitle">Campaign</h2>
                    <span id="statusBadge" class="badge bg-secondary">draft</span>
                </div>
                <div class="btn-group" id="actionBtns"></div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3"><div class="glass-card p-3 text-center"><div class="text-muted small">Total</div><div class="fs-3 fw-bold" id="statTotal">0</div></div></div>
                <div class="col-md-3"><div class="glass-card p-3 text-center"><div class="text-muted small">Sent</div><div class="fs-3 fw-bold text-success" id="statSent">0</div></div></div>
                <div class="col-md-3"><div class="glass-card p-3 text-center"><div class="text-muted small">Pending</div><div class="fs-3 fw-bold text-primary" id="statPending">0</div></div></div>
                <div class="col-md-3"><div class="glass-card p-3 text-center"><div class="text-muted small">Failed</div><div class="fs-3 fw-bold text-danger" id="statFailed">0</div></div></div>
            </div>

            <div class="glass-card p-4">
                <h5 class="mb-3">Recipients</h5>
                <div class="table-responsive" style="max-height: 500px; overflow: auto;">
                    <table class="table table-sm align-middle">
                        <thead><tr><th>Email</th><th>Status</th><th>Sender</th><th>Subject</th><th>Error</th></tr></thead>
                        <tbody id="recipientsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        const campaignId = new URLSearchParams(location.search).get('id');
        if (!campaignId) location.href = '/campaigns.html';

        async function loadCampaign() {
            const res = await axios.get(`/api/campaigns/${campaignId}`);
            const c = res.data;
            document.getElementById('campaignTitle').textContent = c.name;
            document.getElementById('statusBadge').textContent = c.status;
            document.getElementById('statusBadge').className = `badge bg-${c.status === 'running' ? 'primary' : c.status === 'completed' ? 'success' : c.status === 'failed' ? 'danger' : 'secondary'}`;

            const s = c.stats || {};
            document.getElementById('statTotal').textContent = s.total ?? 0;
            document.getElementById('statSent').textContent = s.sent ?? 0;
            document.getElementById('statPending').textContent = s.pending ?? 0;
            document.getElementById('statFailed').textContent = s.failed ?? 0;

            const actions = document.getElementById('actionBtns');
            actions.innerHTML = '';
            if (c.status === 'draft' || c.status === 'paused') {
                actions.innerHTML = `<button class="btn btn-success" id="startBtn"><i class="fa-solid fa-play me-1"></i> Start</button>`;
                document.getElementById('startBtn').onclick = async () => {
                    await axios.post(`/api/campaigns/${campaignId}/start`);
                    showToast('Started', 'success');
                    loadCampaign();
                };
            }
            if (c.status === 'running') {
                actions.innerHTML = `<button class="btn btn-warning" id="pauseBtn"><i class="fa-solid fa-pause me-1"></i> Pause</button>`;
                document.getElementById('pauseBtn').onclick = async () => {
                    await axios.post(`/api/campaigns/${campaignId}/pause`);
                    showToast('Paused', 'success');
                    loadCampaign();
                };
            }

            const tbody = document.getElementById('recipientsBody');
            tbody.innerHTML = (c.recipients || []).slice(0, 200).map(r => `<tr>
                <td>${r.email}</td>
                <td><span class="badge bg-${r.status === 'sent' ? 'success' : r.status === 'failed' ? 'danger' : 'secondary'}">${r.status}</span></td>
                <td class="small">${r.senderEmail || '—'}</td>
                <td class="small text-truncate" style="max-width:200px">${r.subject || '—'}</td>
                <td class="small text-danger">${r.error || ''}</td>
            </tr>`).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCampaign();
            setInterval(loadCampaign, 10000);
        });
    </script>
</body>
</html>
