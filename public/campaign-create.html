<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Campaign - MailOps</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text"><span class="brand-title">MailOps</span></div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <h2 class="fw-bold mb-4">Create Campaign</h2>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="glass-card p-4 mb-4">
                        <h5 class="mb-3">1. Select verified list</h5>
                        <select id="bulkJobSelect" class="form-select mb-2">
                            <option value="">Loading bulk jobs...</option>
                        </select>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="validOnly" checked>
                            <label class="form-check-label" for="validOnly">Valid emails only</label>
                        </div>
                    </div>

                    <div class="glass-card p-4 mb-4">
                        <h5 class="mb-3">2. Campaign details</h5>
                        <div class="mb-3">
                            <label class="form-label">Campaign name</label>
                            <input type="text" id="campaignName" class="form-control" placeholder="March outreach">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Template</label>
                            <select id="templateSelect" class="form-select"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Company name (for {COMPANY_NAME})</label>
                            <input type="text" id="companyName" class="form-control" placeholder="Your Company">
                        </div>
                    </div>

                    <div class="glass-card p-4 mb-4">
                        <h5 class="mb-3">3. Sender accounts</h5>
                        <div id="senderCheckboxes" class="text-muted">Loading senders...</div>
                        <a href="/senders.html" class="btn btn-sm btn-outline-primary mt-2">Manage senders</a>
                    </div>

                    <div class="glass-card p-4">
                        <h5 class="mb-3">4. Send settings</h5>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Min delay (sec)</label>
                                <input type="number" id="minDelay" class="form-control" value="5" min="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Max delay (sec)</label>
                                <input type="number" id="maxDelay" class="form-control" value="15" min="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Max per sender</label>
                                <input type="number" id="maxPerSender" class="form-control" value="450" min="1">
                            </div>
                        </div>
                        <div class="form-check mt-3">
                            <input class="form-check-input" type="checkbox" id="warmUp" checked>
                            <label class="form-check-label" for="warmUp">Warm up accounts before sending</label>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="glass-card p-4 sticky-top" style="top: 1rem;">
                        <h5 class="mb-3">Preview</h5>
                        <p class="small text-muted">Merge fields: {Name}, {Email}, {State}, {SENDER_NAME}, {SENDER_EMAIL}, {COMPANY_NAME}</p>
                        <div id="templatePreview" class="small bg-light dark-bg p-3 rounded" style="white-space: pre-wrap; max-height: 300px; overflow: auto;">Select a template</div>
                        <button id="createBtn" class="btn btn-primary w-100 mt-3">Create Campaign</button>
                        <button id="createAndStartBtn" class="btn btn-success w-100 mt-2">Create &amp; Start</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        let templates = [];
        let senders = [];

        const params = new URLSearchParams(window.location.search);
        const preselectedJob = params.get('bulkJobId');

        function updatePreview() {
            const tpl = templates.find(t => t._id === document.getElementById('templateSelect').value);
            const el = document.getElementById('templatePreview');
            if (!tpl) { el.textContent = 'Select a template'; return; }
            const subj = (tpl.subjectTemplates || [])[0] || '';
            const body = (tpl.bodyTemplates || [])[0] || '';
            el.textContent = `Subject: ${subj}\n\n${body}`;
            document.getElementById('companyName').value = document.getElementById('companyName').value || tpl.companyName || '';
        }

        async function loadData() {
            const [jobsRes, tplRes, sendersRes] = await Promise.all([
                axios.get('/api/history/bulk-jobs'),
                axios.get('/api/templates'),
                axios.get('/api/senders'),
            ]);

            const jobSelect = document.getElementById('bulkJobSelect');
            jobSelect.innerHTML = jobsRes.data.map(j =>
                `<option value="${j._id}" ${j._id === preselectedJob ? 'selected' : ''}>${j.fileName} (${j.stats?.valid ?? 0} valid)</option>`
            ).join('') || '<option value="">No bulk jobs — run bulk verify first</option>';

            templates = tplRes.data;
            document.getElementById('templateSelect').innerHTML = templates.map(t =>
                `<option value="${t._id}">${t.name}${t.isDefault ? ' (default)' : ''}</option>`
            ).join('');
            document.getElementById('templateSelect').addEventListener('change', updatePreview);
            updatePreview();

            senders = sendersRes.data;
            document.getElementById('senderCheckboxes').innerHTML = senders.length
                ? senders.map(s => `<div class="form-check"><input class="form-check-input sender-cb" type="checkbox" value="${s._id}" id="sender-${s._id}" checked><label class="form-check-label" for="sender-${s._id}">${s.displayName || s.email} &lt;${s.email}&gt;</label></div>`).join('')
                : '<p class="text-warning">No senders configured. <a href="/senders.html">Add sender accounts</a> first.</p>';
        }

        async function createCampaign(startAfter) {
            const bulkJobId = document.getElementById('bulkJobSelect').value;
            const name = document.getElementById('campaignName').value.trim();
            if (!bulkJobId || !name) return showToast('Select a bulk job and enter a campaign name', 'error');

            const senderAccountIds = [...document.querySelectorAll('.sender-cb:checked')].map(cb => cb.value);
            if (!senderAccountIds.length) return showToast('Select at least one sender', 'error');

            const payload = {
                bulkJobId,
                name,
                templateId: document.getElementById('templateSelect').value,
                companyName: document.getElementById('companyName').value,
                senderAccountIds,
                validOnly: document.getElementById('validOnly').checked,
                settings: {
                    minDelayMs: Number(document.getElementById('minDelay').value) * 1000,
                    maxDelayMs: Number(document.getElementById('maxDelay').value) * 1000,
                    maxPerSender: Number(document.getElementById('maxPerSender').value),
                    warmUp: document.getElementById('warmUp').checked,
                },
            };

            try {
                const res = await axios.post('/api/campaigns/from-bulk-job', payload);
                if (startAfter) {
                    await axios.post(`/api/campaigns/${res.data._id}/start`);
                    showToast('Campaign created and started', 'success');
                } else {
                    showToast('Campaign created', 'success');
                }
                window.location.href = `/campaign-detail.html?id=${res.data._id}`;
            } catch (e) {
                showToast(e.response?.data?.message || 'Failed to create campaign', 'error');
            }
        }

        document.getElementById('createBtn').addEventListener('click', () => createCampaign(false));
        document.getElementById('createAndStartBtn').addEventListener('click', () => createCampaign(true));
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
