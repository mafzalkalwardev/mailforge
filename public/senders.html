<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senders - MailOps</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>
    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text"><span class="brand-title">MailOps</span></div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">Sender Accounts</h2>
                    <p class="text-muted mb-0">Gmail SMTP/IMAP accounts for campaigns and inbox sync</p>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSenderModal"><i class="fa-solid fa-plus me-2"></i>Add Sender</button>
            </div>

            <div class="glass-card p-4">
                <div id="sendersList" class="text-muted">Loading...</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addSenderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Add Sender Account</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="newEmail" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Display name</label><input type="text" id="newName" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Gmail App Password</label><input type="password" id="newPassword" class="form-control"><div class="form-text">Use a Google App Password, not your main password.</div></div>
                    <div class="mb-3"><label class="form-label">Daily limit</label><input type="number" id="newLimit" class="form-control" value="450"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveSenderBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        async function loadSenders() {
            const el = document.getElementById('sendersList');
            try {
                const res = await axios.get('/api/senders');
                if (!res.data.length) {
                    el.innerHTML = '<p class="text-muted mb-0">No sender accounts yet.</p>';
                    return;
                }
                el.innerHTML = `<div class="table-responsive"><table class="table align-middle"><thead><tr><th>Account</th><th>Limit</th><th>Status</th><th></th></tr></thead><tbody>${res.data.map(s => `<tr>
                    <td><strong>${s.displayName || s.email}</strong><br><small class="text-muted">${s.email}</small></td>
                    <td>${s.dailyLimit}/day</td>
                    <td><span class="badge ${s.enabled ? 'bg-success' : 'bg-secondary'}">${s.enabled ? 'Enabled' : 'Disabled'}</span></td>
                    <td><div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-primary test-btn" data-id="${s._id}">Test SMTP</button>
                        <button class="btn btn-outline-danger del-btn" data-id="${s._id}">Delete</button>
                    </div></td>
                </tr>`).join('')}</tbody></table></div>`;

                el.querySelectorAll('.test-btn').forEach(btn => btn.addEventListener('click', async () => {
                    try {
                        await axios.post(`/api/senders/${btn.dataset.id}/test`);
                        showToast('SMTP connection OK', 'success');
                    } catch (e) { showToast(e.response?.data?.message || 'Test failed', 'error'); }
                }));
                el.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', async () => {
                    if (!confirm('Delete sender?')) return;
                    await axios.delete(`/api/senders/${btn.dataset.id}`);
                    showToast('Deleted', 'success');
                    loadSenders();
                }));
            } catch (e) {
                el.innerHTML = '<p class="text-danger">Failed to load senders</p>';
            }
        }

        document.getElementById('saveSenderBtn').addEventListener('click', async () => {
            try {
                await axios.post('/api/senders', {
                    email: document.getElementById('newEmail').value,
                    displayName: document.getElementById('newName').value,
                    appPassword: document.getElementById('newPassword').value,
                    dailyLimit: Number(document.getElementById('newLimit').value),
                });
                bootstrap.Modal.getInstance(document.getElementById('addSenderModal')).hide();
                showToast('Sender added', 'success');
                loadSenders();
            } catch (e) {
                showToast(e.response?.data?.message || 'Failed to add sender', 'error');
            }
        });

        document.addEventListener('DOMContentLoaded', loadSenders);
    </script>
</body>
</html>
