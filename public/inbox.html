<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - MailForge</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>
    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text"><span class="brand-title">MailForge</span></div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <h2 class="fw-bold mb-1">Unified Inbox</h2>
                    <p class="text-muted mb-0"><span id="inboxStats">Loading...</span></p>
                </div>
                <button class="btn btn-outline-primary" id="syncBtn"><i class="fa-solid fa-rotate me-2"></i>Sync Now</button>
            </div>

            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="glass-card p-3">
                        <label class="form-label small fw-semibold mb-1">Sender account</label>
                        <select id="accountSelect" class="form-select mb-3">
                            <option value="">All accounts (unified)</option>
                        </select>
                        <input type="search" id="searchInput" class="form-control mb-3" placeholder="Search inbox...">
                        <div id="messageList" style="max-height: 560px; overflow-y: auto;"></div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="glass-card p-4" id="messageDetail">
                        <p class="text-muted mb-0">Select a message to read</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        let messages = [];
        let selectedAccount = '';

        function accountLabel(m) {
            const sa = m.senderAccount;
            if (!sa) return '';
            const name = sa.displayName || sa.email?.split('@')[0] || 'Account';
            return `<span class="badge bg-secondary bg-opacity-25 text-body mt-1">${name}</span>`;
        }

        async function loadAccounts() {
            const res = await axios.get('/api/inbox/accounts');
            const sel = document.getElementById('accountSelect');
            const opts = res.data.map(a =>
                `<option value="${a._id}">${a.displayName || a.email.split('@')[0]} (${a.email})</option>`
            ).join('');
            sel.innerHTML = `<option value="">All accounts (unified)</option>${opts}`;
            if (!res.data.length) {
                sel.innerHTML = '<option value="">No sender accounts — add in Senders</option>';
            }
        }

        async function loadStats() {
            const params = selectedAccount ? { account: selectedAccount } : {};
            const res = await axios.get('/api/inbox/stats', { params });
            const scope = selectedAccount
                ? document.getElementById('accountSelect').selectedOptions[0]?.textContent?.split(' (')[0] || 'account'
                : 'all accounts';
            document.getElementById('inboxStats').textContent =
                `${res.data.total} messages · ${res.data.unread} unread · ${res.data.campaignReplies} campaign replies · ${scope}`;
        }

        async function loadMessages(q = '') {
            const params = { q, limit: 100 };
            if (selectedAccount) params.account = selectedAccount;
            const res = await axios.get('/api/inbox', { params });
            messages = res.data.messages;
            const list = document.getElementById('messageList');
            if (!messages.length) {
                list.innerHTML = '<p class="text-muted small p-2">No messages. Select an account and sync.</p>';
                return;
            }
            list.innerHTML = messages.map(m => `<button type="button" class="list-group-item list-group-item-action text-start border-0 rounded mb-1 ${m.isRead ? '' : 'fw-semibold'} msg-item" data-id="${m._id}">
                <div class="d-flex justify-content-between gap-2">
                    <span class="text-truncate">${m.from || 'Unknown'}</span>
                    <small class="text-muted flex-shrink-0">${new Date(m.receivedAt).toLocaleDateString()}</small>
                </div>
                <div class="small text-truncate">${m.subject || '(no subject)'}</div>
                <div class="d-flex gap-1 flex-wrap">${!selectedAccount ? accountLabel(m) : ''}${m.campaign ? '<span class="badge bg-info text-dark mt-1">Campaign reply</span>' : ''}</div>
            </button>`).join('');

            list.querySelectorAll('.msg-item').forEach(btn => btn.addEventListener('click', () => showMessage(btn.dataset.id)));
        }

        function displayBody(m) {
            let body = m.body || m.bodyPreview || '';
            if (body.includes('Content-Type:') && body.includes('Content-Transfer-Encoding:')) {
                const parts = body.split(/\r?\n\r?\n/);
                if (parts.length > 1) body = parts.slice(1).join('\n\n');
            }
            return body.slice(0, 20000);
        }

        async function showMessage(id) {
            const res = await axios.get(`/api/inbox/${id}`);
            const m = res.data;
            await axios.post(`/api/inbox/${id}/read`);
            const sa = m.senderAccount;
            const accountLine = sa
                ? `<strong>Account:</strong> ${sa.displayName || sa.email?.split('@')[0]} &lt;${sa.email}&gt;<br>`
                : '';
            document.getElementById('messageDetail').innerHTML = `
                <div class="mb-3">${accountLine}<strong>From:</strong> ${m.from}<br><strong>To:</strong> ${m.to}<br><strong>Date:</strong> ${new Date(m.receivedAt).toLocaleString()}</div>
                <h5>${m.subject || '(no subject)'}</h5>
                ${m.campaign ? `<p class="small"><span class="badge bg-info text-dark">Reply to campaign: ${m.campaign.name || ''}</span></p>` : ''}
                <hr>
                <pre class="small mb-0" style="white-space: pre-wrap; font-family: inherit;">${displayBody(m)}</pre>`;
            loadMessages(document.getElementById('searchInput').value);
            loadStats();
        }

        document.getElementById('accountSelect').addEventListener('change', async e => {
            selectedAccount = e.target.value;
            document.getElementById('messageDetail').innerHTML = '<p class="text-muted mb-0">Select a message to read</p>';
            await loadStats();
            await loadMessages(document.getElementById('searchInput').value);
        });

        document.getElementById('syncBtn').addEventListener('click', async () => {
            document.getElementById('syncBtn').disabled = true;
            try {
                const payload = selectedAccount ? { senderAccountId: selectedAccount } : {};
                const res = await axios.post('/api/inbox/sync', payload);
                showToast(res.data.message || 'Sync complete', 'success');
                await loadMessages();
                await loadStats();
            } catch (e) {
                showToast(e.response?.data?.message || 'Sync failed', 'error');
            } finally {
                document.getElementById('syncBtn').disabled = false;
            }
        });

        let searchTimer;
        document.getElementById('searchInput').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => loadMessages(e.target.value), 300);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAccounts();
            await loadStats();
            await loadMessages();
        });
    </script>
</body>
</html>
