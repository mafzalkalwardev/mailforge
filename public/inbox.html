<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - MailForge</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme-init.js"></script>
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>
    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text"><span class="brand-title">MailForge</span></div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <h2 class="fw-bold mb-1">Unified Inbox</h2>
                    <p class="text-muted mb-0"><span id="inboxStats">Loading...</span></p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary" id="markAllReadBtn"><i class="fa-solid fa-envelope-open me-2"></i>Mark all read</button>
                    <button class="btn btn-outline-primary" id="syncBtn"><i class="fa-solid fa-rotate me-2"></i>Sync Now</button>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="glass-card p-3">
                        <label class="form-label small fw-semibold mb-1">Sender account</label>
                        <select id="accountSelect" class="form-select mb-3">
                            <option value="">All accounts (unified)</option>
                        </select>
                        <div class="inbox-filter-bar">
                            <button type="button" class="btn btn-sm btn-outline-secondary inbox-filter-btn active" data-filter="all">All</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary inbox-filter-btn" data-filter="unread"><i class="fa-solid fa-envelope me-1"></i>Unread</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary inbox-filter-btn" data-filter="sent"><i class="fa-solid fa-paper-plane me-1"></i>Sent</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary inbox-filter-btn" data-filter="starred"><i class="fa-solid fa-star me-1"></i>Starred</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary inbox-filter-btn" data-filter="important"><i class="fa-solid fa-circle-exclamation me-1"></i>Important</button>
                            <button type="button" class="btn btn-sm btn-outline-primary" id="threadToggleBtn" title="Group by conversation"><i class="fa-solid fa-comments me-1"></i>Threads</button>
                        </div>
                        <input type="search" id="searchInput" class="form-control mb-3" placeholder="Search inbox...">
                        <div id="messageList" style="max-height: 560px; overflow-y: auto;"></div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="glass-card p-4" id="messageDetail">
                        <p class="text-muted mb-0">Select a message to read</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/persistence-banner.js"></script>
    <script src="/js/main.js"></script>
    <script>
        let messages = [];
        let selectedAccount = '';
        let activeFilter = 'all';
        let threadMode = false;
        let currentMessageId = null;

        const QUICK_REPLIES = [
            { label: 'Thanks', body: 'Thank you for your reply. We appreciate your time and will follow up shortly.' },
            { label: 'Follow up', body: 'Just following up on my previous email. Please let me know if you have any questions.' },
            { label: 'Schedule call', body: 'Would you be available for a quick call this week? Reply with a time that works for you.' },
        ];

        const LEAD_TAGS = [
            { id: 'none', label: 'Untagged', cls: 'secondary' },
            { id: 'lead', label: 'Lead', cls: 'success' },
            { id: 'follow_up', label: 'Follow up', cls: 'warning' },
            { id: 'not_interested', label: 'Not interested', cls: 'danger' },
        ];

        function accountLabel(m) {
            const sa = m.senderAccount;
            if (!sa) return '';
            const name = sa.displayName || sa.email?.split('@')[0] || 'Account';
            return `<span class="badge bg-secondary bg-opacity-25 text-body mt-1">${name}</span>`;
        }

        function iconRow(m) {
            const icons = [];
            if (!m.isRead) icons.push('<i class="fa-solid fa-envelope text-primary" title="Unread"></i>');
            if (m.isStarred) icons.push('<i class="fa-solid fa-star text-warning" title="Starred"></i>');
            if (m.isImportant) icons.push('<i class="fa-solid fa-circle-exclamation text-danger" title="Important"></i>');
            return icons.length ? `<span class="d-flex gap-2 ms-1">${icons.join('')}</span>` : '';
        }

        async function loadAccounts() {
            const res = await axios.get('/api/inbox/accounts');
            const sel = document.getElementById('accountSelect');
            const opts = res.data.map(a =>
                `<option value="${a._id}">${a.displayName || a.email.split('@')[0]} (${a.email})</option>`
            ).join('');
            sel.innerHTML = `<option value="">All accounts (unified)</option>${opts}`;
            if (!res.data.length) {
                sel.innerHTML = '<option value="">No sender accounts — add in Senders</option>';
            }
        }

        async function loadStats() {
            const params = selectedAccount ? { account: selectedAccount } : {};
            const res = await axios.get('/api/inbox/stats', { params });
            document.getElementById('inboxStats').textContent =
                `${res.data.total} messages | ${res.data.unread} unread | ${res.data.sent || 0} sent | ${res.data.starred} starred | ${res.data.important} important | ${res.data.campaignReplies} campaign replies`;
        }

        async function loadMessages(q = '') {
            const params = { q, limit: 100 };
            if (selectedAccount) params.account = selectedAccount;
            if (activeFilter !== 'all') params.filter = activeFilter;
            if (threadMode && activeFilter !== 'sent') params.threads = '1';
            const res = await axios.get('/api/inbox', { params });
            messages = res.data.messages;
            const list = document.getElementById('messageList');
            if (!messages.length) {
                list.innerHTML = '<p class="text-muted small p-2">No messages. Select an account and sync.</p>';
                return;
            }
            list.innerHTML = messages.map(m => `<button type="button" class="list-group-item list-group-item-action text-start border-0 rounded mb-1 ${m.isRead ? '' : 'fw-semibold'} msg-item" data-id="${m._id}">
                <div class="d-flex justify-content-between gap-2 align-items-start">
                    <span class="text-truncate">${m.folder === 'sent' ? `To: ${m.to || 'Unknown'}` : (m.from || 'Unknown')}${iconRow(m)}</span>
                    <small class="text-muted flex-shrink-0">${new Date(m.receivedAt).toLocaleDateString()}${m.threadCount > 1 ? ` · ${m.threadCount}` : ''}</small>
                </div>
                <div class="small text-truncate">${m.subject || '(no subject)'}</div>
                <div class="d-flex gap-1 flex-wrap">${m.folder === 'sent' ? '<span class="badge bg-success mt-1">Sent</span>' : ''}${!selectedAccount ? accountLabel(m) : ''}${m.campaign ? `<span class="badge bg-info text-dark mt-1">${m.folder === 'sent' ? 'Campaign sent' : 'Campaign reply'}</span>` : ''}${m.isBounce ? '<span class="badge bg-danger mt-1">Bounce</span>' : ''}${m.leadTag && m.leadTag !== 'none' ? `<span class="badge bg-primary mt-1">${m.leadTag.replace('_', ' ')}</span>` : ''}</div>
            </button>`).join('');

            list.querySelectorAll('.msg-item').forEach(btn => btn.addEventListener('click', () => showMessage(btn.dataset.id)));
        }

        function displayBody(m) {
            let body = m.body || m.bodyPreview || '';
            if (body.includes('Content-Type:') && body.includes('Content-Transfer-Encoding:')) {
                const parts = body.split(/\r?\n\r?\n/);
                if (parts.length > 1) body = parts.slice(1).join('\n\n');
            }
            body = decodeQuotedPrintable(body);
            return body.slice(0, 20000);
        }

        function decodeQuotedPrintable(value) {
            let text = String(value || '').replace(/=\r?\n/g, '');
            if (!/=([0-9A-F]{2})/i.test(text)) return text;
            try {
                const bytes = text.replace(/=([0-9A-F]{2})/gi, (_, hex) =>
                    String.fromCharCode(parseInt(hex, 16))
                );
                return decodeURIComponent(escape(bytes));
            } catch (_) {
                return text.replace(/=([0-9A-F]{2})/gi, (_, hex) =>
                    String.fromCharCode(parseInt(hex, 16))
                );
            }
        }

        async function showMessage(id) {
            const res = await axios.get(`/api/inbox/${id}`);
            const m = res.data;
            currentMessageId = id;
            if (m.folder !== 'sent') await axios.post(`/api/inbox/${id}/read`);
            const sa = m.senderAccount;
            const accountLine = sa
                ? `<strong>Account:</strong> ${sa.displayName || sa.email?.split('@')[0]} &lt;${sa.email}&gt;<br>`
                : '';
            if (m.folder === 'sent') {
                document.getElementById('messageDetail').innerHTML = `
                <div class="mb-3">${accountLine}<strong>From:</strong> ${m.from || ''}<br><strong>To:</strong> ${m.to || ''}<br><strong>Sent:</strong> ${new Date(m.sentAt || m.receivedAt).toLocaleString()}</div>
                <h5>${m.subject || '(no subject)'}</h5>
                ${m.campaign ? `<p class="small"><span class="badge bg-info text-dark">Campaign: ${m.campaign.name || ''}</span></p>` : ''}
                <hr>
                <pre class="small mb-0" id="msgBody" style="white-space: pre-wrap; font-family: inherit;">${displayBody(m) || 'Sent body was not saved for this older message.'}</pre>`;
                return;
            }
            document.getElementById('messageDetail').innerHTML = `
                <div class="d-flex justify-content-between align-items-start gap-2 mb-3">
                    <div>${accountLine}<strong>From:</strong> ${m.from}<br><strong>To:</strong> ${m.to}<br><strong>Date:</strong> ${new Date(m.receivedAt).toLocaleString()}</div>
                    <div class="d-flex gap-1">
                        <button type="button" class="msg-star-btn ${m.isStarred ? 'active' : ''}" id="starBtn" title="Star"><i class="fa-${m.isStarred ? 'solid' : 'regular'} fa-star"></i></button>
                        <button type="button" class="msg-important-btn ${m.isImportant ? 'active' : ''}" id="importantBtn" title="Important"><i class="fa-solid fa-circle-exclamation"></i></button>
                    </div>
                </div>
                <h5>${m.subject || '(no subject)'}</h5>
                ${m.campaign ? `<p class="small"><span class="badge bg-info text-dark">Reply to campaign: ${m.campaign.name || ''}</span></p>` : ''}
                ${m.isBounce ? '<p class="small"><span class="badge bg-danger">Bounce detected — sender auto-suppressed</span></p>' : ''}
                <div class="d-flex flex-wrap gap-1 mb-2" id="leadTagBar">
                    ${LEAD_TAGS.map(t => {
                        const active = (m.leadTag || 'none') === t.id;
                        return `<button type="button" class="btn btn-sm btn-${active ? t.cls : 'outline-' + t.cls} lead-tag-btn" data-tag="${t.id}">${t.label}</button>`;
                    }).join('')}
                </div>
                <hr>
                <pre class="small mb-3" id="msgBody" style="white-space: pre-wrap; font-family: inherit;">${displayBody(m)}</pre>
                <div class="border-top pt-3">
                    <h6 class="fw-semibold mb-2"><i class="fa-solid fa-reply me-1"></i> Reply</h6>
                    <div class="d-flex flex-wrap gap-1 mb-2">
                        ${QUICK_REPLIES.map((q, i) => `<button type="button" class="btn btn-sm btn-outline-secondary quick-reply-btn" data-idx="${i}">${q.label}</button>`).join('')}
                    </div>
                    <textarea id="replyBody" class="form-control mb-2" rows="4" placeholder="Write your reply..."></textarea>
                    <button type="button" class="btn btn-primary btn-sm" id="sendReplyBtn"><i class="fa-solid fa-paper-plane me-1"></i>Send reply</button>
                </div>`;
            document.getElementById('starBtn').addEventListener('click', async e => {
                e.stopPropagation();
                await axios.post(`/api/inbox/${id}/star`);
                showMessage(id);
                loadStats();
            });
            document.getElementById('importantBtn').addEventListener('click', async e => {
                e.stopPropagation();
                await axios.post(`/api/inbox/${id}/important`);
                showMessage(id);
                loadStats();
            });
            document.getElementById('sendReplyBtn').addEventListener('click', async () => {
                const body = document.getElementById('replyBody').value.trim();
                if (!body) return showToast('Enter a reply message', 'error');
                const btn = document.getElementById('sendReplyBtn');
                btn.disabled = true;
                try {
                    await axios.post(`/api/inbox/${id}/reply`, { body });
                    showToast('Reply sent', 'success');
                    document.getElementById('replyBody').value = '';
                } catch (e) {
                    showToast(e.response?.data?.message || 'Reply failed', 'error');
                } finally {
                    btn.disabled = false;
                }
            });
            document.querySelectorAll('.quick-reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.getElementById('replyBody').value = QUICK_REPLIES[Number(btn.dataset.idx)].body;
                });
            });
            document.querySelectorAll('.lead-tag-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    try {
                        await axios.post(`/api/inbox/${id}/lead-tag`, { tag: btn.dataset.tag });
                        showToast('Lead tag updated', 'success');
                        showMessage(id);
                        loadMessages(document.getElementById('searchInput').value);
                    } catch (e) {
                        showToast(e.response?.data?.message || 'Tag update failed', 'error');
                    }
                });
            });
            loadMessages(document.getElementById('searchInput').value);
            loadStats();
        }

        document.getElementById('threadToggleBtn').addEventListener('click', async () => {
            threadMode = !threadMode;
            document.getElementById('threadToggleBtn').classList.toggle('active', threadMode);
            if (activeFilter === 'sent') showToast('Threads apply to inbox messages only', 'info');
            await loadMessages(document.getElementById('searchInput').value);
        });

        document.querySelectorAll('.inbox-filter-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('.inbox-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                await loadMessages(document.getElementById('searchInput').value);
            });
        });

        document.getElementById('accountSelect').addEventListener('change', async e => {
            selectedAccount = e.target.value;
            document.getElementById('messageDetail').innerHTML = '<p class="text-muted mb-0">Select a message to read</p>';
            await loadStats();
            await loadMessages(document.getElementById('searchInput').value);
        });

        document.getElementById('syncBtn').addEventListener('click', async () => {
            document.getElementById('syncBtn').disabled = true;
            try {
                const payload = selectedAccount ? { senderAccountId: selectedAccount } : {};
                const res = await axios.post('/api/inbox/sync', payload);
                showToast(res.data.message || 'Sync complete', 'success');
                await loadMessages();
                await loadStats();
            } catch (e) {
                showToast(e.response?.data?.message || 'Sync failed', 'error');
            } finally {
                document.getElementById('syncBtn').disabled = false;
            }
        });

        document.getElementById('markAllReadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('markAllReadBtn');
            btn.disabled = true;
            try {
                const payload = selectedAccount ? { senderAccountId: selectedAccount } : {};
                const res = await axios.post('/api/inbox/read-all', payload);
                showToast(res.data.message || 'Marked all read', 'success');
                await loadMessages(document.getElementById('searchInput').value);
                await loadStats();
            } catch (e) {
                showToast(e.response?.data?.message || 'Failed to mark read', 'error');
            } finally {
                btn.disabled = false;
            }
        });

        let searchTimer;
        document.getElementById('searchInput').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => loadMessages(e.target.value), 300);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAccounts();
            await loadStats();
            await loadMessages();
        });
    </script>
</body>
</html>
