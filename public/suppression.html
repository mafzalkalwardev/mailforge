<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppression List - MailForge</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme-init.js"></script>
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>
    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text"><span class="brand-title">MailForge</span></div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <h2 class="fw-bold mb-1">Suppression List</h2>
                    <p class="text-muted mb-0">Blocked emails — bounces, unsubscribes, and manual blocks never receive campaigns</p>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
                    <i class="fa-solid fa-plus me-2"></i>Add Email
                </button>
            </div>

            <div class="glass-card p-4 mb-4">
                <div class="d-flex flex-wrap gap-2 mb-3">
                    <button type="button" class="btn btn-sm btn-outline-secondary reason-filter active" data-reason="">All</button>
                    <button type="button" class="btn btn-sm btn-outline-danger reason-filter" data-reason="bounce">Bounces</button>
                    <button type="button" class="btn btn-sm btn-outline-warning reason-filter" data-reason="unsubscribe">Unsubscribes</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary reason-filter" data-reason="manual">Manual</button>
                </div>
                <p id="bounceStats" class="small text-muted mb-3"></p>
                <div class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label class="form-label">Search</label>
                        <input type="search" id="searchInput" class="form-control" placeholder="Filter by email...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Bulk import (one email per line)</label>
                        <textarea id="bulkImport" class="form-control" rows="2" placeholder="bad@example.com&#10;bounce@domain.com"></textarea>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-2" id="bulkImportBtn">Import lines</button>
                    </div>
                </div>
            </div>

            <div class="glass-card p-4">
                <div id="listContainer" class="text-muted">Loading...</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add to suppression list</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="newEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        <select id="newReason" class="form-select">
                            <option value="manual">Manual block</option>
                            <option value="bounce">Bounce</option>
                            <option value="unsubscribe">Unsubscribe</option>
                            <option value="complaint">Complaint</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Note (optional)</label>
                        <input type="text" id="newNote" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveBtn">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/confirm-modal.js"></script>
    <script src="/js/main.js"></script>
    <script>
        const reasonBadge = {
            manual: 'bg-secondary',
            bounce: 'bg-danger',
            unsubscribe: 'bg-warning text-dark',
            complaint: 'bg-dark',
            import: 'bg-info text-dark',
        };
        let activeReason = '';

        async function loadStats() {
            try {
                const res = await axios.get('/api/suppression/stats');
                document.getElementById('bounceStats').textContent =
                    `${res.data.total} suppressed · ${res.data.bounces} bounces · ${res.data.byReason?.unsubscribe || 0} unsubscribes`;
            } catch (_) {}
        }

        async function loadList(q = '') {
            const el = document.getElementById('listContainer');
            try {
                const params = { q, limit: 200 };
                if (activeReason) params.reason = activeReason;
                const res = await axios.get('/api/suppression', { params });
                const items = res.data.items || [];
                if (!items.length) {
                    el.innerHTML = '<p class="text-muted mb-0">No suppressed emails. Bounces and unsubscribes are added automatically.</p>';
                    return;
                }
                el.innerHTML = `<div class="table-responsive"><table class="table align-middle"><thead><tr><th>Email</th><th>Reason</th><th>Note</th><th>Added</th><th></th></tr></thead><tbody>${items.map(i => `<tr>
                    <td><code>${i.email}</code></td>
                    <td><span class="badge ${reasonBadge[i.reason] || 'bg-secondary'}">${i.reason}</span></td>
                    <td class="small text-muted">${i.note || '—'}</td>
                    <td class="small">${new Date(i.createdAt).toLocaleDateString()}</td>
                    <td><button class="btn btn-sm btn-outline-danger del-btn" data-id="${i._id}">Remove</button></td>
                </tr>`).join('')}</tbody></table></div><p class="small text-muted mb-0">${res.data.total} total</p>`;

                el.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', () => {
                    showConfirm({
                        title: 'Remove from suppression?',
                        message: 'This email can receive campaigns again.',
                        confirmText: 'Remove',
                        confirmClass: 'btn-danger',
                        onConfirm: async () => {
                            await axios.delete(`/api/suppression/${btn.dataset.id}`);
                            showToast('Removed', 'success');
                            loadList(document.getElementById('searchInput').value);
                        },
                    });
                }));
            } catch (e) {
                el.innerHTML = '<p class="text-danger">Failed to load suppression list</p>';
            }
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const email = document.getElementById('newEmail').value.trim();
            if (!email) return showToast('Enter an email', 'error');
            try {
                await axios.post('/api/suppression', {
                    email,
                    reason: document.getElementById('newReason').value,
                    note: document.getElementById('newNote').value,
                });
                bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                showToast('Added to suppression list', 'success');
                loadList();
            } catch (e) {
                showToast(e.response?.data?.message || 'Failed to add', 'error');
            }
        });

        document.getElementById('bulkImportBtn').addEventListener('click', async () => {
            const emails = document.getElementById('bulkImport').value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
            if (!emails.length) return showToast('Paste at least one email', 'error');
            try {
                const res = await axios.post('/api/suppression/import', { emails, reason: 'import' });
                showToast(`Imported ${res.data.added} email(s)`, 'success');
                document.getElementById('bulkImport').value = '';
                loadList();
            } catch (e) {
                showToast(e.response?.data?.message || 'Import failed', 'error');
            }
        });

        document.querySelectorAll('.reason-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.reason-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeReason = btn.dataset.reason || '';
                loadList(document.getElementById('searchInput').value);
            });
        });

        let timer;
        document.getElementById('searchInput').addEventListener('input', e => {
            clearTimeout(timer);
            timer = setTimeout(() => loadList(e.target.value), 300);
        });

        document.addEventListener('DOMContentLoaded', () => { loadStats(); loadList(); });
    </script>
</body>
</html>
