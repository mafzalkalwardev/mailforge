<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - MailForge</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme-init.js"></script>
</head>
<body>
    <div class="login-page">
        <div class="glass-card p-5 text-center" style="max-width: 440px; width: 100%; margin: 16px;">
            <img src="/favicon.svg" alt="" width="48" height="48" class="mb-3">
            <h2 class="fw-bold mb-2">Unsubscribe</h2>
            <p class="text-muted" id="statusText">Processing your request...</p>
            <div id="successBlock" class="d-none">
                <p class="text-success mb-0"><i class="fa-solid fa-circle-check me-1"></i> You will no longer receive emails from this sender.</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        (async () => {
            const token = new URLSearchParams(location.search).get('token');
            const status = document.getElementById('statusText');
            if (!token) {
                status.textContent = 'Invalid unsubscribe link.';
                return;
            }
            try {
                await axios.post('/api/suppression/unsubscribe', { token });
                status.classList.add('d-none');
                document.getElementById('successBlock').classList.remove('d-none');
            } catch (e) {
                status.textContent = e.response?.data?.message || 'This unsubscribe link is invalid or expired.';
            }
        })();
    </script>
</body>
</html>
