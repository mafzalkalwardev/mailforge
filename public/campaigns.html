<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns - MailOps</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

    <div class="sidebar glass-card border-start-0 border-top-0 border-bottom-0 rounded-0">
        <div class="sidebar-brand mb-4">
            <a href="/dashboard.html" class="brand-link">
                <img src="/favicon.svg" alt="" class="brand-icon" width="36" height="36">
                <div class="brand-text">
                    <span class="brand-title">MailOps</span>
                    <span class="engine-badge brand-badge" data-engine-badge>truemail-go</span>
                </div>
            </a>
        </div>
        <nav class="nav flex-column px-2"></nav>
        <div class="sidebar-footer">
            <small class="text-muted">Logged in as <strong id="userNameDisplay">User</strong></small>
        </div>
    </div>

    <div class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">Campaigns</h2>
                    <p class="text-muted mb-0">Create and manage email campaigns from verified lists</p>
                </div>
                <a href="/campaign-create.html" class="btn btn-primary"><i class="fa-solid fa-plus me-2"></i>New Campaign</a>
            </div>

            <div class="glass-card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Recipients</th>
                                <th>Sent</th>
                                <th>Failed</th>
                                <th>Created</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="campaignsBody">
                            <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/engine-ui.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/main.js"></script>
    <script>
        const statusBadge = {
            draft: 'bg-secondary',
            running: 'bg-primary',
            paused: 'bg-warning text-dark',
            completed: 'bg-success',
            failed: 'bg-danger',
            cancelled: 'bg-dark',
        };

        async function loadCampaigns() {
            const tbody = document.getElementById('campaignsBody');
            try {
                const res = await axios.get('/api/campaigns');
                const campaigns = res.data;
                if (!campaigns.length) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No campaigns yet. Create one from a verified bulk job.</td></tr>';
                    return;
                }
                tbody.innerHTML = campaigns.map(c => {
                    const s = c.stats || {};
                    const cls = statusBadge[c.status] || 'bg-secondary';
                    return `<tr>
                        <td class="fw-medium"><a href="/campaign-detail.html?id=${c._id}">${c.name}</a></td>
                        <td><span class="badge ${cls}">${c.status}</span></td>
                        <td>${s.total ?? 0}</td>
                        <td class="text-success">${s.sent ?? 0}</td>
                        <td class="text-danger">${s.failed ?? 0}</td>
                        <td class="text-muted small">${new Date(c.createdAt).toLocaleString()}</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                ${c.status === 'draft' || c.status === 'paused' ? `<button class="btn btn-success start-btn" data-id="${c._id}"><i class="fa-solid fa-play"></i></button>` : ''}
                                ${c.status === 'running' ? `<button class="btn btn-warning pause-btn" data-id="${c._id}"><i class="fa-solid fa-pause"></i></button>` : ''}
                                <button class="btn btn-outline-danger delete-btn" data-id="${c._id}"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
                }).join('');

                tbody.querySelectorAll('.start-btn').forEach(btn => btn.addEventListener('click', async () => {
                    try {
                        await axios.post(`/api/campaigns/${btn.dataset.id}/start`);
                        showToast('Campaign started', 'success');
                        loadCampaigns();
                    } catch (e) { showToast(e.response?.data?.message || 'Start failed', 'error'); }
                }));
                tbody.querySelectorAll('.pause-btn').forEach(btn => btn.addEventListener('click', async () => {
                    try {
                        await axios.post(`/api/campaigns/${btn.dataset.id}/pause`);
                        showToast('Campaign paused', 'success');
                        loadCampaigns();
                    } catch (e) { showToast(e.response?.data?.message || 'Pause failed', 'error'); }
                }));
                tbody.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', async () => {
                    if (!confirm('Delete this campaign?')) return;
                    try {
                        await axios.delete(`/api/campaigns/${btn.dataset.id}`);
                        showToast('Campaign deleted', 'success');
                        loadCampaigns();
                    } catch (e) { showToast(e.response?.data?.message || 'Delete failed', 'error'); }
                }));
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Failed to load campaigns</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCampaigns();
            setInterval(loadCampaigns, 15000);
        });
    </script>
</body>
</html>
